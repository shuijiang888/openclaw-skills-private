<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no" />
  <title>企业营销能力快速诊断</title>
  <style>
    :root {
      --primary: #0d3b66;
      --primary-light: #1a5080;
      --accent: #2e8bc0;
      --bg: #e8eef4;
      --card: #ffffff;
      --text: #1a1a2e;
      --muted: #5c6b7a;
      --danger: #c0392b;
      --radius: 12px;
      --shadow: 0 4px 20px rgba(13, 59, 102, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      font-size: 16px;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }
    .wrap {
      max-width: 480px;
      margin: 0 auto;
      padding: 16px 16px 32px;
    }
    header {
      text-align: center;
      padding: 12px 0 8px;
    }
    header h1 {
      margin: 0;
      font-size: 1.25rem;
      color: var(--primary);
      font-weight: 700;
    }
    header p {
      margin: 8px 0 0;
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
    }
    .progress-outer {
      height: 8px;
      background: #c5d4e3;
      border-radius: 4px;
      overflow: hidden;
      margin: 16px 0;
    }
    .progress-inner {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      border-radius: 4px;
      transition: width 0.25s ease;
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px 18px;
      margin-bottom: 16px;
    }
    .dim-tag {
      display: inline-block;
      font-size: 12px;
      color: var(--accent);
      background: rgba(46, 139, 192, 0.12);
      padding: 4px 10px;
      border-radius: 20px;
      margin-bottom: 10px;
      font-weight: 600;
    }
    .q-title {
      font-size: 17px;
      font-weight: 600;
      line-height: 1.45;
      margin: 0 0 16px;
    }
    .hint {
      font-size: 13px;
      color: var(--muted);
      margin: -8px 0 14px;
    }
    .opt {
      display: block;
      width: 100%;
      text-align: left;
      padding: 14px 16px;
      min-height: 44px;
      margin-bottom: 10px;
      border: 2px solid #d0dbe6;
      border-radius: 10px;
      background: #fafbfc;
      font-size: 16px;
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .opt:active { transform: scale(0.99); }
    .opt.selected {
      border-color: var(--primary);
      background: rgba(13, 59, 102, 0.06);
      font-weight: 500;
    }
    .opt.multi.selected {
      border-color: var(--accent);
      background: rgba(46, 139, 192, 0.1);
    }
    .nav-row {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }
    .btn {
      flex: 1;
      min-height: 48px;
      font-size: 18px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    .btn-primary {
      background: var(--primary);
      color: #fff;
    }
    .btn-primary:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .btn-ghost {
      background: #eef2f6;
      color: var(--primary);
    }
    .err {
      color: var(--danger);
      font-size: 14px;
      margin-top: 10px;
      display: none;
    }
    .err.show { display: block; }
    input.inp, textarea.inp {
      width: 100%;
      padding: 14px 14px;
      font-size: 16px;
      border: 2px solid #d0dbe6;
      border-radius: 10px;
      margin-bottom: 12px;
    }
    textarea.inp { min-height: 88px; resize: vertical; }
    .label { font-size: 14px; font-weight: 600; color: var(--muted); margin-bottom: 6px; display: block; }
    #screen-report { display: none; }
    #screen-report.visible { display: block; }
    #screen-quiz.hidden { display: none; }
    .score-big {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--primary);
      text-align: center;
      margin: 8px 0;
    }
    .level-pill {
      display: inline-block;
      margin: 0 auto 16px;
      padding: 6px 16px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 15px;
      background: var(--accent);
      color: #fff;
    }
    .dim-list li {
      margin: 8px 0;
      line-height: 1.5;
    }
    .top3 li { margin: 12px 0; }
    .cta-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 20px;
    }
    .btn-secondary {
      background: var(--primary-light);
      color: #fff;
    }
    .lead-form { margin-top: 20px; padding-top: 16px; border-top: 1px solid #e0e6ed; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>企业营销能力快速诊断</h1>
      <p>约 5–8 分钟 · 提交后即时生成摘要（结果需真实使用后校准）</p>
    </header>

    <div id="screen-quiz">
      <div class="progress-meta">
        <span id="dim-label">维度</span>
        <span id="step-label">1 / 26</span>
      </div>
      <div class="progress-outer"><div class="progress-inner" id="progress-bar" style="width:3.85%"></div></div>
      <div class="card" id="question-card"></div>
      <p class="err" id="err-msg">请完成本题后再继续</p>
      <div class="nav-row">
        <button type="button" class="btn btn-ghost" id="btn-prev">上一题</button>
        <button type="button" class="btn btn-primary" id="btn-next">下一题</button>
      </div>
    </div>

    <div id="screen-report">
      <div class="card">
        <h2 style="margin:0 0 8px;font-size:1.2rem;color:var(--primary);">《诊断报告》摘要</h2>
        <p style="margin:0;color:var(--muted);font-size:14px;">浏览器内测算 · 仅供参考</p>
        <div class="score-big" id="rep-total">—</div>
        <div style="text-align:center"><span class="level-pill" id="rep-level">—</span></div>
        <h3 style="font-size:16px;margin:16px 0 8px;">各维度得分（加权）</h3>
        <ul class="dim-list" id="rep-dims"></ul>
        <h3 style="font-size:16px;margin:20px 0 8px;">核心短板 TOP3</h3>
        <ol class="top3" id="rep-top3"></ol>
      </div>
      <div class="card">
        <div class="cta-row">
          <button type="button" class="btn btn-primary" id="cta-screenshot">截图保存本页</button>
          <button type="button" class="btn btn-secondary" id="cta-book">预约专家解读（演示）</button>
          <button type="button" class="btn btn-ghost" id="cta-reset">重新填写</button>
        </div>
        <div class="lead-form">
          <p style="font-weight:600;margin:0 0 12px;">留下联系方式（便于回访）</p>
          <label class="label">姓名</label>
          <input class="inp" id="lead-name" placeholder="必填" />
          <label class="label">手机</label>
          <input class="inp" id="lead-phone" type="tel" inputmode="tel" placeholder="必填" />
          <label class="label">公司</label>
          <input class="inp" id="lead-co" placeholder="必填" />
          <button type="button" class="btn btn-primary" style="width:100%;margin-top:8px" id="lead-save">保存线索（仅本地演示）</button>
          <p style="font-size:13px;color:var(--muted);margin:10px 0 0;">Phase 2 将接入 CRM；当前仅弹窗确认，不落库。</p>
        </div>
      </div>
    </div>
  </div>

  <script>
(function () {
  'use strict';

  var DIMS = [
    { id: 'D1', name: '市场定位与目标客户', maxW: 20, issues: '画像与战略叙事可能不清晰，市场投入难衡量。' },
    { id: 'D2', name: '获客渠道与线索质量', maxW: 20, issues: '线索来源与转化治理薄弱，市场销售对齐不足。' },
    { id: 'D3', name: '销售管道与赢单率', maxW: 20, issues: '管道标准化与计划落地不足，大客户协作弱。' },
    { id: 'D4', name: '客户成功与续费/复购', maxW: 15, issues: '交付后健康度与回款风险关注不足。' },
    { id: 'D5', name: '团队架构与激励机制', maxW: 15, issues: '考核与培养体系、跨部门协同待加强。' },
    { id: 'D6', name: '数字化工具与数据应用', maxW: 10, issues: 'CRM/看板/SOP 在线化不足，数据难运营。' }
  ];

  var state = {
    qIndex: 0,
    single: {},      // qid -> score number
    multi: {},       // qid -> array of option keys
    text: { q25: {}, q26: '' }
  };

  function setMulti(qid, key, toggle) {
    if (!state.multi[qid]) state.multi[qid] = [];
    var arr = state.multi[qid];
    var i = arr.indexOf(key);
    if (toggle) {
      if (i >= 0) arr.splice(i, 1); else arr.push(key);
    } else {
      state.multi[qid] = [key];
    }
  }

  function scoreQ2(keys) {
    var sum = 0;
    keys.forEach(function (k) { sum += 2; });
    return Math.min(5, sum);
  }

  function scoreQ5(keys) {
    var MAIN = ['ch1','ch2','ch3','ch4','ch5','ch6'];
    var n = keys.filter(function (k) { return MAIN.indexOf(k) >= 0; }).length;
    var onlyNone = keys.length === 1 && keys[0] === 'none';
    if (onlyNone) return 1;
    if (n === 0 && keys.indexOf('none') < 0) return 0;
    return Math.min(5, n + 1);
  }

  function scoreQ8(keys) {
    return Math.max(0, 5 - keys.length);
  }

  function scoreQ11(keys) {
    var s = 5;
    if (keys.indexOf('mismatch') >= 0) s -= 1;
    if (keys.indexOf('relation') >= 0) s -= 1;
    if (keys.indexOf('slow') >= 0) s -= 1;
    if (keys.indexOf('nosum') >= 0) s -= 1;
    return Math.max(0, s);
  }

  function scoreQ15(keys) { return Math.max(0, 5 - keys.length); }
  function scoreQ19(keys) { return Math.max(0, 5 - keys.length); }

  function scoreQ23(keys) {
    var n = keys.length;
    if (n <= 0) return 0;
    if (n === 1) return 3;
    return 5;
  }

  function computeScores() {
    var r = [0,0,0,0,0,0];
    r[0] = (state.single.q1||0) + scoreQ2(state.multi.q2||[]) + (state.single.q3||0) + (state.single.q4||0);
    r[1] = scoreQ5(state.multi.q5||[]) + (state.single.q6||0) + (state.single.q7||0) + scoreQ8(state.multi.q8||[]);
    r[2] = (state.single.q9||0) + (state.single.q10||0) + scoreQ11(state.multi.q11||[]) + (state.single.q12||0);
    r[3] = (state.single.q13||0) + (state.single.q14||0) + scoreQ15(state.multi.q15||[]) + (state.single.q16||0);
    r[4] = (state.single.q17||0) + (state.single.q18||0) + scoreQ19(state.multi.q19||[]) + (state.single.q20||0);
    r[5] = (state.single.q21||0) + (state.single.q22||0) + scoreQ23(state.multi.q23||[]) + (state.single.q24||0);
    var w = r.map(function (raw, i) {
      var cap = DIMS[i].maxW;
      return (raw / 20) * cap;
    });
    var total = w.reduce(function (a,b) { return a+b; }, 0);
    return { raw: r, weighted: w, total: Math.round(total * 10) / 10 };
  }

  function levelOf(t) {
    if (t >= 90) return '卓越';
    if (t >= 70) return '良好';
    if (t >= 50) return '一般';
    if (t >= 30) return '薄弱';
    return '危机';
  }

  var QUESTIONS = [
    { id: 'q1', dim: 0, type: 'sc', title: '贵司目标客户画像清晰度？', opts: [
        { k: 'a', t: '有文档化 ICP，销售与市场共用', s: 5 },
        { k: 'b', t: '业务上清楚，未成文', s: 3 },
        { k: 'c', t: '主要靠老板/骨干经验，新人难对齐', s: 2 },
        { k: 'd', t: '不清晰，机会驱动', s: 1 }
    ]},
    { id: 'q2', dim: 0, type: 'mc2', title: '未来 12 个月战略重点？（最多选 2 项）', hint: '每项 2 分，合计封顶 5 分', opts: [
        { k: 'p1', t: '守住基本盘、提升利润' },
        { k: 'p2', t: '拓展新行业/新区域' },
        { k: 'p3', t: '大客户突破/灯塔案例' },
        { k: 'p4', t: '渠道扩张与秩序整治' },
        { k: 'p5', t: '出海/第二增长曲线' }
    ]},
    { id: 'q3', dim: 0, type: 'sc', title: '与主要竞争对手相比，差异化表达是否一致？', opts: [
        { k: 'a', t: '对外话术、标书、官网叙事一致', s: 5 },
        { k: 'b', t: '大体一致，细节有出入', s: 3 },
        { k: 'c', t: '各说各话，依赖个人发挥', s: 1 }
    ]},
    { id: 'q4', dim: 0, type: 'sc', title: '品牌与市场投入的可衡量目标？', opts: [
        { k: 'a', t: '有明确线索/商机 KPI 并复盘', s: 5 },
        { k: 'b', t: '有预算但效果难量化', s: 3 },
        { k: 'c', t: '以曝光为主，与销售脱节', s: 1 }
    ]},
    { id: 'q5', dim: 1, type: 'mc', title: '当前有效获客渠道？（可多选）', hint: '前 6 项：得分=min(5,N+1)；仅选「暂无可复制渠道」为 1 分', opts: [
        { k: 'ch1', t: '官网/SEO/SEM' },
        { k: 'ch2', t: '展会与行业活动' },
        { k: 'ch3', t: '客户转介绍' },
        { k: 'ch4', t: '渠道伙伴' },
        { k: 'ch5', t: '内容/社群/短视频' },
        { k: 'ch6', t: '电销/外呼团队' },
        { k: 'none', t: '暂无可复制渠道' }
    ]},
    { id: 'q6', dim: 1, type: 'sc', title: '线索到商机转化率与行业/历史对比？', opts: [
        { k: 'a', t: '优于历史与对标', s: 5 },
        { k: 'b', t: '持平', s: 3 },
        { k: 'c', t: '低于预期，原因不清', s: 2 },
        { k: 'd', t: '无统计', s: 1 }
    ]},
    { id: 'q7', dim: 1, type: 'sc', title: '市场部与销售部对「合格线索定义」是否一致？', opts: [
        { k: 'a', t: '书面一致并系统落地', s: 5 },
        { k: 'b', t: '会议对齐，执行有偏差', s: 3 },
        { k: 'c', t: '无统一标准', s: 1 }
    ]},
    { id: 'q8', dim: 1, type: 'mc', title: '线索质量问题表现？（多选，每项扣 1 分，基础 5 分）', opts: [
        { k: 'a', t: '重复线索多、撞单多' },
        { k: 'b', t: '假号码/无效留资多' },
        { k: 'c', t: '跟进优先级靠感觉' },
        { k: 'd', t: '渠道造假量或刷数据' }
    ]},
    { id: 'q9', dim: 2, type: 'sc', title: '销售管道阶段定义与赢率是否标准化？', opts: [
        { k: 'a', t: '阶段、必填字段、退出标准清晰', s: 5 },
        { k: 'b', t: '有阶段但执行松散', s: 3 },
        { k: 'c', t: '无统一管道语言', s: 1 }
    ]},
    { id: 'q10', dim: 2, type: 'sc', title: '年度/季度计划到个人动作分解？', opts: [
        { k: 'a', t: '工具+复盘闭环', s: 5 },
        { k: 'b', t: '有分解，落地走样', s: 3 },
        { k: 'c', t: '老板拍板或走过场', s: 1 }
    ]},
    { id: 'q11', dim: 2, type: 'mc', title: '丢单主要原因？（多选，见计分规则）', hint: '产品/关系/协同各 -1；未总结原因再 -1；价格/竞品不扣分', opts: [
        { k: 'price', t: '价格/商务政策' },
        { k: 'mismatch', t: '产品/方案不匹配' },
        { k: 'relation', t: '关系/决策链失守' },
        { k: 'slow', t: '内部协同慢、响应慢' },
        { k: 'comp', t: '竞品强力抢单' },
        { k: 'nosum', t: '未总结原因' }
    ]},
    { id: 'q12', dim: 2, type: 'sc', title: '大客户/复杂项目是否有协作机制（铁三角/项目制）？', opts: [
        { k: 'a', t: '常态化运作', s: 5 },
        { k: 'b', t: '大项目临时组队', s: 3 },
        { k: 'c', t: '基本靠单兵', s: 1 }
    ]},
    { id: 'q13', dim: 3, type: 'sc', title: '交付后客户健康度是否可度量（使用、工单、回款）？', opts: [
        { k: 'a', t: '有健康分或红黄绿', s: 5 },
        { k: 'b', t: '部分数据分散在各系统', s: 3 },
        { k: 'c', t: '几乎不跟踪', s: 1 }
    ]},
    { id: 'q14', dim: 3, type: 'sc', title: '续费/增购流程是否销售化、可预测？', opts: [
        { k: 'a', t: '有续约节奏与清单', s: 5 },
        { k: 'b', t: '靠老客户关系维护', s: 3 },
        { k: 'c', t: '被动响应', s: 1 }
    ]},
    { id: 'q15', dim: 3, type: 'mc', title: '回款与风险表现？（多选，每项扣 1 分，基础 5 分）', opts: [
        { k: 'a', t: '应收账款周期长、催收弱' },
        { k: 'b', t: '无合同发货或单据不全' },
        { k: 'c', t: '授信随意、坏账风险高' },
        { k: 'd', t: '验收拖延导致挂账' }
    ]},
    { id: 'q16', dim: 3, type: 'sc', title: '售后成本与客户满意是否挂钩到销售或渠道？', opts: [
        { k: 'a', t: '有机制', s: 5 },
        { k: 'b', t: '部分挂钩', s: 3 },
        { k: 'c', t: '不挂钩，售后成短板', s: 1 }
    ]},
    { id: 'q17', dim: 4, type: 'sc', title: '考核是否与过程质量、协作挂钩（不仅是销售额）？', opts: [
        { k: 'a', t: '多维度且可解释', s: 5 },
        { k: 'b', t: '以业绩为主，辅以简单行为项', s: 3 },
        { k: 'c', t: '几乎只看数字', s: 1 }
    ]},
    { id: 'q18', dim: 4, type: 'sc', title: '新人存活率与培养体系？', opts: [
        { k: 'a', t: '标准化培训+带教+认证', s: 5 },
        { k: 'b', t: '有培训但效果一般', s: 3 },
        { k: 'c', t: '招不来或留不住', s: 1 }
    ]},
    { id: 'q19', dim: 4, type: 'mc', title: '团队管理痛点？（多选，每项扣 1 分，基础 5 分）', opts: [
        { k: 'a', t: '躺平在老客户' },
        { k: 'b', t: '管理者弱、只会自己干' },
        { k: 'c', t: '激励不公平引发内耗' },
        { k: 'd', t: '会议多、表格多无结果' }
    ]},
    { id: 'q20', dim: 4, type: 'sc', title: '跨部门协作（交付/产品/财务）效率？', opts: [
        { k: 'a', t: '流程清晰 SLA 明确', s: 5 },
        { k: 'b', t: '常需老板拍板', s: 3 },
        { k: 'c', t: '内耗严重', s: 1 }
    ]},
    { id: 'q21', dim: 5, type: 'sc', title: 'CRM/销售系统使用情况？', opts: [
        { k: 'a', t: '主数据统一、过程必填、报表可信', s: 5 },
        { k: 'b', t: '在用但数据质量一般', s: 3 },
        { k: 'c', t: '表格/邮件为主', s: 1 }
    ]},
    { id: 'q22', dim: 5, type: 'sc', title: '是否具备可运营的数据看板（管道、转化、人效）？', opts: [
        { k: 'a', t: '实时或 T+1', s: 5 },
        { k: 'b', t: '月度手工统计', s: 3 },
        { k: 'c', t: '无', s: 1 }
    ]},
    { id: 'q23', dim: 5, type: 'mc', title: '销售 SOP / playbooks 是否在线化？（多选）', hint: 'N=0→0 分；N=1→3 分；N≥2→5 分', opts: [
        { k: 'a', t: '拜访与商机 SOP' },
        { k: 'b', t: '报价与合同审批在线' },
        { k: 'c', t: '培训与话术库' },
        { k: 'd', t: '与企微/钉钉协同' }
    ]},
    { id: 'q24', dim: 5, type: 'sc', title: '对 AI 辅助（线索评分、纪要、推荐下一步）态度与试点？', opts: [
        { k: 'a', t: '已试点或规划清晰', s: 5 },
        { k: 'b', t: '观望', s: 3 },
        { k: 'c', t: '无计划', s: 1 }
    ]},
    { id: 'q25', dim: -1, type: 'contact', title: '方便回访的联系方式', hint: '不计入得分' },
    { id: 'q26', dim: -1, type: 'open', title: '最想解决的 1 个营销问题（可选）', hint: '一句话即可' }
  ];

  var card = document.getElementById('question-card');
  var errEl = document.getElementById('err-msg');
  var bar = document.getElementById('progress-bar');
  var stepLabel = document.getElementById('step-label');
  var dimLabel = document.getElementById('dim-label');
  var btnPrev = document.getElementById('btn-prev');
  var btnNext = document.getElementById('btn-next');

  function showErr(msg) {
    errEl.textContent = msg || '请完成本题后再继续';
    errEl.classList.add('show');
  }
  function hideErr() { errEl.classList.remove('show'); }

  function validateCurrent() {
    var q = QUESTIONS[state.qIndex];
    hideErr();
    if (q.type === 'sc') {
      if (state.single[q.id] == null) { showErr(); return false; }
      return true;
    }
    if (q.type === 'mc' || q.type === 'mc2') {
      var arr = state.multi[q.id] || [];
      if (q.id === 'q2' && arr.length < 1) { showErr('请至少选择 1 项战略重点'); return false; }
      if (q.id === 'q5') {
        if (arr.length < 1) { showErr('请至少选择一项'); return false; }
      }
      return true;
    }
    if (q.type === 'contact') {
      var t = state.text.q25;
      if (!t.name || !t.name.trim()) { showErr('请填写姓名'); return false; }
      if (!t.phone || !t.phone.trim()) { showErr('请填写手机'); return false; }
      if (!t.company || !t.company.trim()) { showErr('请填写公司'); return false; }
      return true;
    }
    if (q.type === 'open') return true;
    return true;
  }

  function render() {
    var q = QUESTIONS[state.qIndex];
    var di = q.dim;
    if (di >= 0) dimLabel.textContent = DIMS[di].id + ' ' + DIMS[di].name;
    else dimLabel.textContent = '联系信息';

    var pct = ((state.qIndex + 1) / 26) * 100;
    bar.style.width = pct + '%';
    stepLabel.textContent = (state.qIndex + 1) + ' / 26';

    var html = '';
    html += '<div class="dim-tag">Q' + (state.qIndex + 1) + '</div>';
    html += '<div class="q-title">' + q.title + '</div>';
    if (q.hint) html += '<p class="hint">' + q.hint + '</p>';

    if (q.type === 'sc') {
      q.opts.forEach(function (o) {
        var sel = state.single[q.id] === o.s ? ' selected' : '';
        html += '<button type="button" class="opt' + sel + '" data-sc="' + o.s + '">' + o.t + '</button>';
      });
    } else if (q.type === 'mc') {
      var selArr = state.multi[q.id] || [];
      q.opts.forEach(function (o) {
        var sel = selArr.indexOf(o.k) >= 0 ? ' multi selected' : ' multi';
        html += '<button type="button" class="opt' + sel + '" data-mc="' + o.k + '">' + o.t + '</button>';
      });
    } else if (q.type === 'mc2') {
      var s2 = state.multi[q.id] || [];
      q.opts.forEach(function (o) {
        var sel = s2.indexOf(o.k) >= 0 ? ' multi selected' : ' multi';
        html += '<button type="button" class="opt' + sel + '" data-mc2="' + o.k + '">' + o.t + '</button>';
      });
    } else if (q.type === 'contact') {
      var t = state.text.q25;
      html += '<label class="label">姓名</label><input class="inp" data-f="name" value="' + esc(t.name||'') + '" />';
      html += '<label class="label">手机</label><input class="inp" data-f="phone" value="' + esc(t.phone||'') + '" type="tel" />';
      html += '<label class="label">公司</label><input class="inp" data-f="company" value="' + esc(t.company||'') + '" />';
      html += '<label class="label">职位（选填）</label><input class="inp" data-f="title" value="' + esc(t.title||'') + '" />';
    } else if (q.type === 'open') {
      html += '<textarea class="inp" id="open-ta" placeholder="选填">' + esc(state.text.q26||'') + '</textarea>';
    }

    card.innerHTML = html;

    card.querySelectorAll('.opt[data-sc]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        state.single[q.id] = parseInt(btn.getAttribute('data-sc'), 10);
        render();
      });
    });
    card.querySelectorAll('.opt[data-mc]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var k = btn.getAttribute('data-mc');
        setMulti(q.id, k, true);
        render();
      });
    });
    card.querySelectorAll('.opt[data-mc2]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var k = btn.getAttribute('data-mc2');
        var arr = state.multi[q.id] || [];
        var i = arr.indexOf(k);
        if (i >= 0) arr.splice(i, 1);
        else {
          if (arr.length >= 2) arr.shift();
          arr.push(k);
        }
        state.multi[q.id] = arr;
        render();
      });
    });
    card.querySelectorAll('.inp[data-f]').forEach(function (inp) {
      inp.addEventListener('input', function () {
        state.text.q25[inp.getAttribute('data-f')] = inp.value;
      });
    });
    var ta = document.getElementById('open-ta');
    if (ta) ta.addEventListener('input', function () { state.text.q26 = ta.value; });

    btnPrev.style.visibility = state.qIndex === 0 ? 'hidden' : 'visible';
    btnNext.textContent = state.qIndex === 25 ? '提交并生成报告' : '下一题';
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
  }

  function showReport() {
    var res = computeScores();
    document.getElementById('screen-quiz').classList.add('hidden');
    document.getElementById('screen-report').classList.add('visible');
    document.getElementById('rep-total').textContent = res.total + ' / 100';
    document.getElementById('rep-level').textContent = levelOf(res.total);

    var ul = document.getElementById('rep-dims');
    ul.innerHTML = '';
    DIMS.forEach(function (d, i) {
      var li = document.createElement('li');
      li.textContent = d.name + '：' + (Math.round(res.weighted[i] * 10) / 10) + ' / ' + d.maxW;
      ul.appendChild(li);
    });

    var idxs = [0,1,2,3,4,5].sort(function (a,b) { return res.weighted[a] - res.weighted[b]; });
    var top3 = document.getElementById('rep-top3');
    top3.innerHTML = '';
    for (var j = 0; j < 3; j++) {
      var ii = idxs[j];
      var li2 = document.createElement('li');
      li2.innerHTML = '<strong>' + DIMS[ii].name + '</strong>（加权 ' + (Math.round(res.weighted[ii]*10)/10) + '）— ' + DIMS[ii].issues;
      top3.appendChild(li2);
    }

    document.getElementById('lead-name').value = state.text.q25.name || '';
    document.getElementById('lead-phone').value = state.text.q25.phone || '';
    document.getElementById('lead-co').value = state.text.q25.company || '';
  }

  btnNext.addEventListener('click', function () {
    if (!validateCurrent()) return;
    if (state.qIndex < 25) {
      state.qIndex++;
      render();
    } else {
      showReport();
    }
  });

  btnPrev.addEventListener('click', function () {
    if (state.qIndex > 0) {
      state.qIndex--;
      render();
    }
  });

  document.getElementById('cta-reset').addEventListener('click', function () {
    state = { qIndex: 0, single: {}, multi: {}, text: { q25: {}, q26: '' } };
    document.getElementById('screen-report').classList.remove('visible');
    document.getElementById('screen-quiz').classList.remove('hidden');
    render();
  });

  document.getElementById('cta-screenshot').addEventListener('click', function () {
    alert('请使用手机系统截图功能保存本页（MVP 未集成 html2canvas）。');
  });
  document.getElementById('cta-book').addEventListener('click', function () {
    alert('预约链接 Phase 2 配置；请将联系方式交给销售顾问。');
  });
  document.getElementById('lead-save').addEventListener('click', function () {
    var n = document.getElementById('lead-name').value.trim();
    var p = document.getElementById('lead-phone').value.trim();
    var c = document.getElementById('lead-co').value.trim();
    if (!n || !p || !c) { alert('请填写姓名、手机、公司'); return; }
    alert('已记录（演示）：' + n + ' / ' + p + ' / ' + c + '\n实际环境将写入 CRM。');
  });

  render();
})();
  </script>
</body>
</html>
