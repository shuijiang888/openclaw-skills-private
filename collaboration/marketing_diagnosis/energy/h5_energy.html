<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no" />
  <title>能源电力行业营销诊断</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <style>
    :root {
      --bg: #eef4fb;
      --card: #ffffff;
      --text: #10243f;
      --muted: #5a6b80;
      --primary: #0f3d6f;
      --accent: #0ea5e9;
      --line: #d8e5f3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap { max-width: 760px; margin: 0 auto; padding: 18px 14px 36px; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(16, 36, 63, 0.08);
      padding: 16px;
      margin-bottom: 12px;
    }
    .hide { display: none; }
    h1 { margin: 0; color: var(--primary); font-size: 24px; }
    .sub { margin: 8px 0 0; color: var(--muted); font-size: 14px; line-height: 1.6; }
    .welcome-list { margin: 12px 0 0; padding-left: 20px; color: var(--muted); line-height: 1.65; font-size: 14px; }
    .progress-meta { display: flex; justify-content: space-between; color: var(--muted); font-size: 13px; margin-bottom: 8px; }
    .bar { height: 8px; border-radius: 999px; overflow: hidden; background: #dbe8f5; }
    .bar > i { display: block; width: 0; height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); }
    .module-strip { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 6px; margin-top: 10px; }
    .module-chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 8px;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      background: #f7fbff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .module-chip.active { border-color: var(--accent); color: #035277; background: #e8f6ff; font-weight: 700; }
    .q-title { margin: 4px 0 12px; font-size: 17px; font-weight: 700; line-height: 1.5; }
    .hint { margin: 0 0 10px; color: var(--muted); font-size: 13px; }
    .opt, .btn {
      display: block;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #f8fbff;
      color: var(--text);
      font-size: 15px;
      padding: 12px;
      text-align: left;
      margin-bottom: 8px;
      cursor: pointer;
    }
    .opt.sel { border-color: var(--accent); background: #e9f6ff; }
    .btn { text-align: center; font-weight: 700; }
    .btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .btn.ghost { background: #fff; }
    .row { display: flex; gap: 10px; }
    .row .btn { margin-bottom: 0; }
    .inp, textarea.inp {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
      font-size: 15px;
      margin-bottom: 8px;
      background: #fff;
    }
    textarea.inp { min-height: 84px; resize: vertical; }
    .score { margin: 4px 0; color: var(--primary); font-weight: 800; font-size: 34px; }
    .small { font-size: 13px; color: var(--muted); }
    .pill { display: inline-block; padding: 5px 9px; margin: 0 6px 6px 0; border-radius: 999px; background: #e6f4ff; color: #0f5070; font-size: 12px; }
    #radar { display: block; margin: 0 auto; width: 300px; max-width: 100%; height: auto; }
    #radar-legend li, #top3 li { margin: 6px 0; line-height: 1.5; color: #2c405a; }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="screen-welcome" class="card">
      <h1>能源电力行业营销诊断</h1>
      <p class="sub">采用 <strong>QB + 模块一至模块四</strong> 问卷框架。先完成 <strong>10 步轻诊断</strong> 查看初估，再继续完整版（总计 22 步）。</p>
      <ul class="welcome-list">
        <li>QB：公司、细分赛道（Q_B2 多选）、规模、年限</li>
        <li>模块一至四：认知、痛点、数字化、合作模式意向（共 16 题）</li>
        <li>报告会写入 Q_B2 多选结果，并支持导出 PDF 与专家预约</li>
      </ul>
      <button id="btn-start" class="btn primary">全新开始</button>
      <button id="btn-resume" class="btn ghost hide">继续上次</button>
    </div>

    <div id="screen-quiz" class="hide">
      <div class="card">
        <div class="progress-meta">
          <span id="step-tag">轻诊断阶段</span>
          <span id="step-text">1 / 10</span>
        </div>
        <div class="bar"><i id="bar"></i></div>
        <div id="module-strip" class="module-strip"></div>
      </div>
      <div class="card" id="q-card"></div>
      <div class="row">
        <button id="btn-prev" class="btn ghost">上一题</button>
        <button id="btn-next" class="btn primary">下一题</button>
      </div>
    </div>

    <div id="screen-preview" class="card hide">
      <h2 style="margin:0 0 8px;color:#0f3d6f;">查看初估画像</h2>
      <p class="small">你已完成轻诊断 10 步，当前分数按前 6 题能力项计算（满分 30）用于示意。</p>
      <p class="score" id="preview-score">--</p>
      <button id="btn-continue-full" class="btn primary">继续完成完整版</button>
    </div>

    <div id="screen-report" class="card hide">
      <h2 id="report-title" style="margin:0 0 8px;color:#0f3d6f;">能源电力行业营销诊断报告</h2>
      <p class="score" id="final-score">--</p>
      <p class="small" id="level-text">等级：--</p>
      <p><strong>企业：</strong><span id="rep-company">--</span></p>
      <p><strong>主要细分赛道（Q_B2）：</strong><span id="rep-segments">--</span></p>
      <svg id="radar" width="300" height="300" viewBox="0 0 300 300" aria-label="能力雷达图"></svg>
      <ul id="radar-legend"></ul>
      <h3 style="margin:12px 0 8px;color:#0f3d6f;">核心问题 TOP3</h3>
      <ol id="top3"></ol>
      <div style="margin-top:10px;">
        <button id="btn-book" class="btn primary">预约专家（先二次确认）</button>
        <button id="btn-pdf" class="btn">导出 PDF</button>
        <button id="btn-reset" class="btn ghost">重新填写</button>
      </div>
    </div>
  </div>

  <script>
  var CONFIG = {
    companyName: "纷享销客·中西南",
    bookingUrl: "https://www.fxiaoke.com/",
    hotline: "400-000-0000",
    reportTitle: "能源电力行业营销诊断报告",
    industryEdition: "energy",
    industryEditionLabel: "能源电力行业",
    apiBaseUrl: "/api/diag",
    questionnaireVersion: "energy_v1",
    scoringModelVersion: "score_v1_9"
  };

  (function () {
    function postJson(url, payload) {
      return fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      }).then(function (res) {
        return res.json().then(function (json) {
          if (!res.ok || !json || json.code !== 0) {
            throw new Error((json && (json.message || json.error)) || ("HTTP " + res.status));
          }
          return json.data || null;
        });
      });
    }

    function detectApiBaseUrl() {
      var raw = (CONFIG.apiBaseUrl || "").trim();
      if (!raw) return "";
      if (/^https?:\/\//i.test(raw)) return raw.replace(/\/+$/, "");
      return raw.replace(/\/+$/, "");
    }

    var STORAGE_KEY = "diag_energy_v1";
    var STORAGE_VERSION = 2;
    var LIGHT_TAIL_QI = 9;
    var FULL_RESUME_QI = 5;
    var LITE_LIMIT = 10;
    var MODULES = [
      "模块一 · 行业认知探测",
      "模块二 · 核心痛点",
      "模块三 · 数字化现状",
      "模块四 · 合作模式意向"
    ];
    var DIMS = [
      { name: "市场与认知", maxW: 25, issue: "行业认知与项目策略需进一步清晰化。" },
      { name: "经营与痛点治理", maxW: 25, issue: "核心痛点治理机制仍有断点。" },
      { name: "数字化能力", maxW: 25, issue: "数据联通与工具深度应用有提升空间。" },
      { name: "转型与合作意向", maxW: 25, issue: "合作模式与转型路径有待明确优先级。" }
    ];
    var SEGS = [
      { id: "grid", text: "电网" },
      { id: "generation", text: "发电" },
      { id: "storage", text: "储能" },
      { id: "pv_wind", text: "光伏/风电" },
      { id: "retail", text: "售电" },
      { id: "epc", text: "EPC 总包" },
      { id: "other", text: "其他" }
    ];
    var QUESTIONS = [
      { id: "M1_Q1", module: 0, dim: 0, type: "mc", title: "你们对细分赛道竞争格局的认知深度？", options: [{k:"a",t:"有季度级竞争情报地图",s:3},{k:"b",t:"有年度梳理",s:2},{k:"c",t:"主要靠经验",s:1}] },
      { id: "M1_Q2", module: 0, dim: 0, type: "mc", title: "项目型销售机制是否标准化？", options: [{k:"a",t:"标准流程与角色明确",s:3},{k:"b",t:"部分项目有标准",s:2},{k:"c",t:"高度依赖个人",s:1}] },
      { id: "M1_Q3", module: 0, dim: 0, type: "mc", title: "对能源转型政策的响应速度如何？", options: [{k:"a",t:"提前布局",s:3},{k:"b",t:"跟随响应",s:2},{k:"c",t:"被动应对",s:1}] },
      { id: "M1_Q4", module: 0, dim: 0, type: "sc", title: "对电力市场化机制理解程度？", options: [{k:"a",t:"深度理解并用于经营",s:5},{k:"b",t:"理解一般",s:3},{k:"c",t:"理解较弱",s:1}] },

      { id: "M2_Q1", module: 1, dim: 1, type: "mc", title: "项目周期长的主要原因（可多选）", options: [{k:"a",t:"前期调研不足",s:2},{k:"b",t:"多方审批慢",s:2},{k:"c",t:"资源协调不足",s:1}] },
      { id: "M2_Q2", module: 1, dim: 1, type: "mc", title: "政企关系维护机制是否体系化？", options: [{k:"a",t:"常态化机制",s:3},{k:"b",t:"项目驱动为主",s:2},{k:"c",t:"缺乏体系",s:1}] },
      { id: "M2_Q3", module: 1, dim: 1, type: "mc", title: "投标竞争优势是否可复用？", options: [{k:"a",t:"模板化且复盘",s:3},{k:"b",t:"部分复用",s:2},{k:"c",t:"临场发挥",s:1}] },
      { id: "M2_Q4", module: 1, dim: 1, type: "sc", title: "客户数据分散问题是否可控？", options: [{k:"a",t:"已实现主数据统一",s:5},{k:"b",t:"部分统一",s:3},{k:"c",t:"分散严重",s:1}] },

      { id: "M3_Q1", module: 2, dim: 2, type: "mc", title: "CRM 使用深度如何？", options: [{k:"a",t:"全流程使用",s:3},{k:"b",t:"核心环节使用",s:2},{k:"c",t:"录入为主",s:1}] },
      { id: "M3_Q2", module: 2, dim: 2, type: "mc", title: "数据孤岛影响程度？", options: [{k:"a",t:"影响小",s:3},{k:"b",t:"中等影响",s:2},{k:"c",t:"影响显著",s:1}] },
      { id: "M3_Q3", module: 2, dim: 2, type: "mc", title: "AI 在销售经营中的应用情况？", options: [{k:"a",t:"已规模化应用",s:3},{k:"b",t:"试点中",s:2},{k:"c",t:"未应用",s:1}] },
      { id: "M3_Q4", module: 2, dim: 2, type: "sc", title: "IoT 数据是否进入经营决策？", options: [{k:"a",t:"决策强依赖",s:5},{k:"b",t:"辅助参考",s:3},{k:"c",t:"基本未使用",s:1}] },

      { id: "M4_Q1", module: 3, dim: 3, type: "mc", title: "更偏好的合作服务模式（可多选）", options: [{k:"a",t:"咨询+系统共建",s:2},{k:"b",t:"专项项目制",s:2},{k:"c",t:"长期运营陪跑",s:1}] },
      { id: "M4_Q2", module: 3, dim: 3, type: "mc", title: "预算规划清晰程度如何？", options: [{k:"a",t:"年度预算清晰",s:3},{k:"b",t:"季度滚动预算",s:2},{k:"c",t:"临时决策",s:1}] },
      { id: "M4_Q3", module: 3, dim: 3, type: "mc", title: "是否愿意参与标杆案例共建？", options: [{k:"a",t:"强意愿",s:3},{k:"b",t:"有条件参与",s:2},{k:"c",t:"意愿较低",s:1}] },
      { id: "M4_Q4", module: 3, dim: 3, type: "sc", title: "生态伙伴协同开放度如何？", options: [{k:"a",t:"开放协同",s:5},{k:"b",t:"部分开放",s:3},{k:"c",t:"较封闭",s:1}] },

      { id: "CONTACT", module: 3, dim: -1, type: "contact", title: "联系方式（用于顾问回访）" },
      { id: "OPEN", module: 3, dim: -1, type: "open", title: "你当前最希望优先解决的问题（选填）" }
    ];

    var TOTAL_STEPS = 4 + QUESTIONS.length;
    var welcome = document.getElementById("screen-welcome");
    var quiz = document.getElementById("screen-quiz");
    var preview = document.getElementById("screen-preview");
    var report = document.getElementById("screen-report");
    var qCard = document.getElementById("q-card");
    var stepTag = document.getElementById("step-tag");
    var stepText = document.getElementById("step-text");
    var bar = document.getElementById("bar");
    var btnResume = document.getElementById("btn-resume");
    var moduleStrip = document.getElementById("module-strip");
    var currentSubmissionId = "";

    var state = {
      v: STORAGE_VERSION,
      qIndex: 0,
      phase: "welcome",
      unlockedFull: false,
      basic: { companyName: "", q_b2: [], scale: "", years: "" },
      answers: {},
      contact: { name: "", phone: "", company: "" },
      openText: "",
      generated: false
    };

    function setVisible(name) {
      welcome.classList.add("hide");
      quiz.classList.add("hide");
      preview.classList.add("hide");
      report.classList.add("hide");
      if (name === "welcome") welcome.classList.remove("hide");
      if (name === "quiz") quiz.classList.remove("hide");
      if (name === "preview") preview.classList.remove("hide");
      if (name === "report") report.classList.remove("hide");
    }
    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
    function clearSaved() { localStorage.removeItem(STORAGE_KEY); }
    function loadSaved() {
      try {
        var raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return false;
        var parsed = JSON.parse(raw);
        if (!parsed || parsed.v !== STORAGE_VERSION || parsed.generated) return false;
        state = parsed;
        return true;
      } catch (e) { return false; }
    }
    function segText() {
      var map = {};
      for (var i = 0; i < SEGS.length; i++) map[SEGS[i].id] = SEGS[i].text;
      var arr = state.basic.q_b2 || [];
      if (!arr.length) return "未填写";
      return arr.map(function (id) { return map[id] || id; }).join("、");
    }
    function getAbilityQuestion() {
      var idx = state.qIndex - 4;
      if (idx < 0 || idx >= QUESTIONS.length) return null;
      return QUESTIONS[idx];
    }
    function renderModuleStrip() {
      var q = getAbilityQuestion();
      var active = q ? q.module : -1;
      var html = "";
      for (var i = 0; i < MODULES.length; i++) {
        html += '<span class="module-chip' + (i === active ? " active" : "") + '">' + MODULES[i] + "</span>";
      }
      moduleStrip.innerHTML = html;
    }
    function renderProgress() {
      var isLite = !state.unlockedFull && state.qIndex <= LIGHT_TAIL_QI;
      if (isLite) {
        stepTag.textContent = "轻诊断阶段";
        stepText.textContent = (state.qIndex + 1) + " / " + LITE_LIMIT;
        bar.style.width = (((state.qIndex + 1) / LITE_LIMIT) * 100) + "%";
      } else {
        stepTag.textContent = "完整版阶段";
        stepText.textContent = (state.qIndex + 1) + " / " + TOTAL_STEPS;
        bar.style.width = (((state.qIndex + 1) / TOTAL_STEPS) * 100) + "%";
      }
      renderModuleStrip();
    }
    function renderBasic() {
      var step = state.qIndex + 1;
      if (step === 1) {
        return '<div class="q-title">Q_B1 公司名称</div><input id="inp-company" class="inp" placeholder="请输入公司名称" value="' + (state.basic.companyName || "") + '" />';
      }
      if (step === 2) {
        var html = '<div class="q-title">Q_B2 细分赛道（可多选）</div><p class="hint">将写入报告 #rep-segments。</p>';
        for (var i = 0; i < SEGS.length; i++) {
          var seg = SEGS[i];
          var sel = (state.basic.q_b2 || []).indexOf(seg.id) >= 0 ? " sel" : "";
          html += '<button type="button" class="opt' + sel + '" data-seg="' + seg.id + '">' + seg.text + "</button>";
        }
        return html;
      }
      if (step === 3) {
        var scales = ["100人以下", "100-500人", "500-2000人", "2000人以上"];
        var html2 = '<div class="q-title">Q_B3 企业规模</div>';
        for (var j = 0; j < scales.length; j++) {
          var s = scales[j];
          var sel2 = state.basic.scale === s ? " sel" : "";
          html2 += '<button type="button" class="opt' + sel2 + '" data-scale="' + s + '">' + s + "</button>";
        }
        return html2;
      }
      var years = ["3年以下", "3-10年", "10-20年", "20年以上"];
      var html3 = '<div class="q-title">Q_B4 成立年限</div>';
      for (var k = 0; k < years.length; k++) {
        var y = years[k];
        var sel3 = state.basic.years === y ? " sel" : "";
        html3 += '<button type="button" class="opt' + sel3 + '" data-years="' + y + '">' + y + "</button>";
      }
      return html3;
    }
    function renderAbility(q) {
      if (q.type === "contact") {
        return '<div class="q-title">' + q.title + '</div>'
          + '<input id="contact-name" class="inp" placeholder="姓名（必填）" value="' + (state.contact.name || "") + '" />'
          + '<input id="contact-phone" class="inp" placeholder="手机（必填）" value="' + (state.contact.phone || "") + '" />'
          + '<input id="contact-company" class="inp" placeholder="公司（必填）" value="' + (state.contact.company || state.basic.companyName || "") + '" />';
      }
      if (q.type === "open") {
        return '<div class="q-title">' + q.title + '</div><textarea id="open-text" class="inp" placeholder="选填">' + (state.openText || "") + "</textarea>";
      }
      var html = '<div class="q-title">' + q.title + "</div>";
      if (q.type === "mc") html += '<p class="hint">多选计分，分值封顶 5 分。</p>';
      var ans = state.answers[q.id];
      for (var i = 0; i < q.options.length; i++) {
        var opt = q.options[i];
        var selected = false;
        if (q.type === "mc") selected = (ans || []).indexOf(opt.k) >= 0;
        else selected = ans === opt.k;
        html += '<button type="button" class="opt' + (selected ? " sel" : "") + '" data-qid="' + q.id + '" data-key="' + opt.k + '">' + opt.t + "</button>";
      }
      return html;
    }
    function renderQuestion() {
      renderProgress();
      var q = getAbilityQuestion();
      qCard.innerHTML = q ? renderAbility(q) : renderBasic();
      bindQuestionEvents();
    }
    function bindQuestionEvents() {
      var inpCompany = document.getElementById("inp-company");
      if (inpCompany) {
        inpCompany.addEventListener("input", function () { state.basic.companyName = inpCompany.value; save(); });
      }
      var segBtns = qCard.querySelectorAll("[data-seg]");
      for (var i = 0; i < segBtns.length; i++) {
        segBtns[i].addEventListener("click", function () {
          var id = this.getAttribute("data-seg");
          var arr = state.basic.q_b2 || [];
          var ix = arr.indexOf(id);
          if (ix >= 0) arr.splice(ix, 1); else arr.push(id);
          state.basic.q_b2 = arr;
          save();
          renderQuestion();
        });
      }
      var scales = qCard.querySelectorAll("[data-scale]");
      for (var j = 0; j < scales.length; j++) {
        scales[j].addEventListener("click", function () {
          state.basic.scale = this.getAttribute("data-scale");
          save();
          renderQuestion();
        });
      }
      var years = qCard.querySelectorAll("[data-years]");
      for (var k = 0; k < years.length; k++) {
        years[k].addEventListener("click", function () {
          state.basic.years = this.getAttribute("data-years");
          save();
          renderQuestion();
        });
      }
      var opts = qCard.querySelectorAll("[data-qid]");
      for (var x = 0; x < opts.length; x++) {
        opts[x].addEventListener("click", function () {
          var qid = this.getAttribute("data-qid");
          var key = this.getAttribute("data-key");
          var q = getAbilityQuestion();
          if (!q || q.id !== qid) return;
          if (q.type === "mc") {
            var arr = state.answers[qid] || [];
            var idx = arr.indexOf(key);
            if (idx >= 0) arr.splice(idx, 1); else arr.push(key);
            state.answers[qid] = arr;
          } else {
            state.answers[qid] = key;
          }
          save();
          renderQuestion();
        });
      }
      var contactName = document.getElementById("contact-name");
      var contactPhone = document.getElementById("contact-phone");
      var contactCompany = document.getElementById("contact-company");
      if (contactName) contactName.addEventListener("input", function () { state.contact.name = this.value; save(); });
      if (contactPhone) contactPhone.addEventListener("input", function () { state.contact.phone = this.value; save(); });
      if (contactCompany) contactCompany.addEventListener("input", function () { state.contact.company = this.value; save(); });
      var openText = document.getElementById("open-text");
      if (openText) openText.addEventListener("input", function () { state.openText = this.value; save(); });
    }
    function validCurrent() {
      if (state.qIndex === 0) return !!(state.basic.companyName || "").trim();
      if (state.qIndex === 1) return (state.basic.q_b2 || []).length > 0;
      if (state.qIndex === 2) return !!state.basic.scale;
      if (state.qIndex === 3) return !!state.basic.years;
      var q = getAbilityQuestion();
      if (!q) return true;
      if (q.type === "contact") return !!state.contact.name && !!state.contact.phone && !!state.contact.company;
      if (q.type === "open") return true;
      if (q.type === "mc") return (state.answers[q.id] || []).length > 0;
      return !!state.answers[q.id];
    }
    function scoreQuestion(q) {
      var ans = state.answers[q.id];
      if (!ans) return 0;
      if (q.type === "sc") {
        for (var i = 0; i < q.options.length; i++) if (q.options[i].k === ans) return q.options[i].s;
        return 0;
      }
      var sum = 0;
      for (var j = 0; j < q.options.length; j++) {
        if (ans.indexOf(q.options[j].k) >= 0) sum += q.options[j].s;
      }
      return Math.min(5, sum);
    }
    function computeScores() {
      var raw = [];
      var maxRaw = [];
      for (var i = 0; i < DIMS.length; i++) { raw.push(0); maxRaw.push(0); }
      for (var x = 0; x < QUESTIONS.length; x++) {
        var q = QUESTIONS[x];
        if (q.dim < 0) continue;
        raw[q.dim] += scoreQuestion(q);
        maxRaw[q.dim] += 5;
      }
      var weighted = [];
      for (var d = 0; d < DIMS.length; d++) {
        var ratio = maxRaw[d] ? raw[d] / maxRaw[d] : 0;
        weighted.push(Math.round(ratio * DIMS[d].maxW * 10) / 10);
      }
      var total = weighted.reduce(function (acc, n) { return acc + n; }, 0);
      return { weighted: weighted, total: Math.round(total * 10) / 10 };
    }
    function computePreview() {
      var ids = QUESTIONS.slice(0, 6);
      var sum = 0;
      for (var i = 0; i < ids.length; i++) sum += scoreQuestion(ids[i]);
      return { score: sum, max: 30 };
    }
    function level(v) {
      if (v >= 85) return "卓越";
      if (v >= 70) return "良好";
      if (v >= 50) return "一般";
      return "薄弱";
    }
    function drawRadar(weighted) {
      var svg = document.getElementById("radar");
      while (svg.firstChild) svg.removeChild(svg.firstChild);
      var cx = 150, cy = 150, radius = 92;
      var n = weighted.length;
      var angles = [];
      for (var i = 0; i < n; i++) angles.push(-Math.PI / 2 + (Math.PI * 2 * i / n));
      function pt(angle, r) { return { x: cx + Math.cos(angle) * r, y: cy + Math.sin(angle) * r }; }
      function ring(level) {
        var path = "";
        for (var k = 0; k < n; k++) {
          var p = pt(angles[k], radius * level);
          path += (k === 0 ? "M" : "L") + p.x.toFixed(2) + "," + p.y.toFixed(2) + " ";
        }
        return path + "Z";
      }
      var grid = [0.25, 0.5, 0.75, 1];
      for (var g = 0; g < grid.length; g++) {
        var ringPath = document.createElementNS("http://www.w3.org/2000/svg", "path");
        ringPath.setAttribute("d", ring(grid[g]));
        ringPath.setAttribute("fill", "none");
        ringPath.setAttribute("stroke", "#c9d8ea");
        ringPath.setAttribute("stroke-width", g === grid.length - 1 ? "1.6" : "1");
        svg.appendChild(ringPath);
      }
      for (var a = 0; a < n; a++) {
        var edge = pt(angles[a], radius);
        var line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", String(cx));
        line.setAttribute("y1", String(cy));
        line.setAttribute("x2", String(edge.x));
        line.setAttribute("y2", String(edge.y));
        line.setAttribute("stroke", "#d8e5f3");
        svg.appendChild(line);
      }
      var points = [];
      for (var p = 0; p < n; p++) {
        var ratio = DIMS[p].maxW ? weighted[p] / DIMS[p].maxW : 0;
        var node = pt(angles[p], Math.max(0, Math.min(1, ratio)) * radius);
        points.push(node.x.toFixed(2) + "," + node.y.toFixed(2));
      }
      var poly = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
      poly.setAttribute("points", points.join(" "));
      poly.setAttribute("fill", "rgba(14,165,233,0.35)");
      poly.setAttribute("stroke", "#0f3d6f");
      poly.setAttribute("stroke-width", "2");
      svg.appendChild(poly);
    }
    function gotoPreview() {
      var pv = computePreview();
      document.getElementById("preview-score").textContent = pv.score + " / " + pv.max + "（初估）";
      state.phase = "preview";
      save();
      setVisible("preview");
    }
    function gotoReport() {
      var res = computeScores();
      document.getElementById("report-title").textContent = CONFIG.reportTitle;
      document.getElementById("final-score").textContent = res.total + " / 100";
      document.getElementById("level-text").textContent = "等级：" + level(res.total);
      document.getElementById("rep-company").textContent = state.basic.companyName || "未填写";
      document.getElementById("rep-segments").textContent = segText();
      drawRadar(res.weighted);

      var submissionPayload = {
        industryEdition: CONFIG.industryEdition,
        questionnaireVersion: CONFIG.questionnaireVersion,
        scoringModelVersion: CONFIG.scoringModelVersion,
        sourcePage: "/diag/h5_energy.html",
        type: "questionnaire_submission",
        payload: {
          stepMeta: { totalSteps: TOTAL_STEPS, liteLimit: LITE_LIMIT, resumeFromQIndex: FULL_RESUME_QI },
          rawAnswers: state.answers
        },
        qbPayload: {
          q_b1_companyName: state.basic.companyName || "",
          q_b2_segments: state.basic.q_b2 || [],
          q_b3_scale: state.basic.scale || "",
          q_b4_years: state.basic.years || ""
        },
        answersPayload: state.answers || {},
        clientScorePayload: res
      };

      postJson(CONFIG.apiBaseUrl + "/submissions", submissionPayload)
        .then(function (data) {
          currentSubmissionId = data && data.submissionId ? data.submissionId : "";
          if (!currentSubmissionId) return;
          return postJson(CONFIG.apiBaseUrl + "/summary-lead", {
            submissionId: currentSubmissionId,
            company: state.basic.companyName || "未填写",
            leadKind: "diagnosis_summary",
            industryEdition: CONFIG.industryEdition,
            sourcePage: "/diag/h5_energy.html"
          }).catch(function () {});
        })
        .catch(function () {});

      var legend = document.getElementById("radar-legend");
      legend.innerHTML = "";
      for (var i = 0; i < DIMS.length; i++) {
        var li = document.createElement("li");
        li.textContent = DIMS[i].name + "：" + res.weighted[i] + " / " + DIMS[i].maxW;
        legend.appendChild(li);
      }
      var idxs = [];
      for (var x = 0; x < DIMS.length; x++) idxs.push(x);
      idxs.sort(function (a, b) { return res.weighted[a] - res.weighted[b]; });
      var top3 = document.getElementById("top3");
      top3.innerHTML = "";
      var topCount = Math.min(3, DIMS.length);
      for (var j = 0; j < topCount; j++) {
        var idx = idxs[j];
        var item = document.createElement("li");
        item.innerHTML = "<strong>" + DIMS[idx].name + "</strong>（" + res.weighted[idx] + "）：" + DIMS[idx].issue;
        top3.appendChild(item);
      }
      setVisible("report");
      state.phase = "report";
      state.generated = true;
      clearSaved();
    }

    document.getElementById("btn-start").addEventListener("click", function () {
      state = {
        v: STORAGE_VERSION,
        qIndex: 0,
        phase: "quiz",
        unlockedFull: false,
        basic: { companyName: "", q_b2: [], scale: "", years: "" },
        answers: {},
        contact: { name: "", phone: "", company: "" },
        openText: "",
        generated: false
      };
      setVisible("quiz");
      renderQuestion();
      save();
    });
    document.getElementById("btn-resume").addEventListener("click", function () {
      if (state.phase === "preview") setVisible("preview");
      else { state.phase = "quiz"; setVisible("quiz"); renderQuestion(); }
    });
    document.getElementById("btn-prev").addEventListener("click", function () {
      if (state.qIndex > 0) {
        state.qIndex -= 1;
        state.phase = "quiz";
        save();
        renderQuestion();
      }
    });
    document.getElementById("btn-next").addEventListener("click", function () {
      if (!validCurrent()) { alert("请先完成当前题目。"); return; }
      if (!state.unlockedFull && state.qIndex === LIGHT_TAIL_QI) {
        gotoPreview();
        return;
      }
      if (state.qIndex < TOTAL_STEPS - 1) {
        state.qIndex += 1;
        state.phase = "quiz";
        save();
        renderQuestion();
      } else {
        gotoReport();
      }
    });
    document.getElementById("btn-continue-full").addEventListener("click", function () {
      state.unlockedFull = true;
      state.phase = "quiz";
      state.qIndex = FULL_RESUME_QI;
      save();
      setVisible("quiz");
      renderQuestion();
    });
    document.getElementById("btn-book").addEventListener("click", function () {
      if (confirm("将打开预约落地页，是否继续？")) {
        if (currentSubmissionId) {
          postJson(CONFIG.apiBaseUrl + "/leads", {
            submissionId: currentSubmissionId,
            leadKind: "expert_opportunity",
            name: state.contact.name || "未填写",
            phone: state.contact.phone || "未填写",
            company: state.contact.company || state.basic.companyName || "未填写",
            role: "",
            bookingIntent: true,
            type: "expert_booking",
            payload: { sourcePage: "/diag/h5_energy.html", note: state.openText || "" }
          }).catch(function () {});
        }
        window.open(CONFIG.bookingUrl, "_blank", "noopener");
      }
    });
    document.getElementById("btn-pdf").addEventListener("click", function () {
      if (typeof html2pdf === "undefined") {
        alert("PDF 导出组件不可用，请检查 cdnjs 网络可达性。");
        return;
      }
      var btn = this;
      btn.disabled = true;
      btn.textContent = "PDF 生成中...";
      var opt = {
        margin: 10,
        filename: "能源电力行业营销诊断报告.pdf",
        image: { type: "jpeg", quality: 0.95 },
        html2canvas: { scale: 2, useCORS: true, logging: false },
        jsPDF: { unit: "mm", format: "a4", orientation: "portrait" }
      };
      html2pdf().set(opt).from(document.getElementById("screen-report")).save()
        .then(function () {
          btn.disabled = false;
          btn.textContent = "导出 PDF";
        })
        .catch(function () {
          btn.disabled = false;
          btn.textContent = "导出 PDF";
          alert("PDF 导出失败，请重试。");
        });
    });
    document.getElementById("btn-reset").addEventListener("click", function () {
      clearSaved();
      state = {
        v: STORAGE_VERSION,
        qIndex: 0,
        phase: "welcome",
        unlockedFull: false,
        basic: { companyName: "", q_b2: [], scale: "", years: "" },
        answers: {},
        contact: { name: "", phone: "", company: "" },
        openText: "",
        generated: false
      };
      btnResume.classList.add("hide");
      setVisible("welcome");
    });

    if (loadSaved()) btnResume.classList.remove("hide");
  })();
  </script>
</body>
