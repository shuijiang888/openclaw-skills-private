# 单入口最优方案：同一 IP:80
# - /           → 制造业盈利管理系统（Next 容器 127.0.0.1:3000）
# - /intel/     → 智能情报系统（静态文件目录 html/intel/，与 basePath=/intel 构建产物一致）
#
# 1. 情报：next.config 设 basePath: '/intel'（必要时 assetPrefix: '/intel'），构建后将
#    导出目录内容放到 /usr/share/nginx/html/intel/（含 index.html）
# 2. 盈利：./deploy/tencent-cvm-profit-docker.sh（门户默认跳转 /intel/，无需写死 IP）
# 3. 本文件 → /etc/nginx/conf.d/99-unified-portal.conf，执行 nginx -t && systemctl reload nginx
# 4. 删除或禁用原 default_server 中仅 root 静态的 location /，避免冲突

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;

    location = /intel {
        return 301 /intel/;
    }

    location /intel/ {
        try_files $uri $uri/ /intel/index.html;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
